<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ほめらる - あなたの小さな避難所</title>
<style>
:root{--bg:#F8F6F2;--text:#3F3A36;--text-light:#8A8580;--card-bg:#FFFFFF;--shadow:0 2px 16px rgba(63,58,54,0.06);--radius:16px;--maru-main:#D8B84C;--maru-sub:#F4E7B2;--maru-accent:#A8891F;--nagi-main:#6F8FAF;--nagi-sub:#DCE7F0;--nagi-accent:#4F6B86;--rin-main:#8A6F5A;--rin-sub:#E8DDD4;--rin-accent:#5E493B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;line-height:1.7;letter-spacing:0.02em;overflow-x:hidden;}
.screen{display:none;min-height:100dvh;padding:0 20px;animation:fadeIn 0.4s ease;}
.screen.active{display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
#home{justify-content:center;align-items:center;gap:32px;padding-top:60px;padding-bottom:40px;}
.home-greeting{text-align:center;animation:slideUp 0.6s ease;}
.home-greeting .time-label{font-size:13px;color:var(--text-light);margin-bottom:8px;}
.home-greeting h1{font-size:20px;font-weight:500;color:var(--text);line-height:1.6;}
.daily-message{text-align:center;font-size:14px;color:var(--text-light);padding:16px 24px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);max-width:320px;animation:slideUp 0.8s ease;line-height:1.8;}
.character-select{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px;animation:slideUp 1s ease;}
.character-select h2{font-size:14px;color:var(--text-light);text-align:center;font-weight:400;margin-bottom:4px;}
.char-btn{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--card-bg);border:2px solid transparent;border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:all 0.25s ease;text-align:left;width:100%;font-family:inherit;}
.char-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(63,58,54,0.1);}
.char-btn:active{transform:scale(0.98);}
.char-dot{width:44px;height:44px;border-radius:50%;flex-shrink:0;animation:breathe 3s ease infinite;}
.char-btn[data-char="maru"] .char-dot{background:var(--maru-main);}
.char-btn[data-char="nagi"] .char-dot{background:var(--nagi-main);}
.char-btn[data-char="rin"] .char-dot{background:var(--rin-main);}
.char-btn[data-char="maru"]:hover{border-color:var(--maru-sub);}
.char-btn[data-char="nagi"]:hover{border-color:var(--nagi-sub);}
.char-btn[data-char="rin"]:hover{border-color:var(--rin-sub);}
.char-info .char-name{font-size:16px;font-weight:600;margin-bottom:2px;}
.char-info .char-desc{font-size:12px;color:var(--text-light);}
.char-btn[data-char="maru"] .char-name{color:var(--maru-accent);}
.char-btn[data-char="nagi"] .char-name{color:var(--nagi-accent);}
.char-btn[data-char="rin"] .char-name{color:var(--rin-accent);}
#input-screen{justify-content:center;align-items:center;gap:24px;padding-top:40px;padding-bottom:40px;}
.input-back{position:absolute;top:20px;left:20px;background:none;border:none;font-size:14px;color:var(--text-light);cursor:pointer;font-family:inherit;padding:8px;}
.input-header{text-align:center;}
.input-header .selected-dot{width:56px;height:56px;border-radius:50%;margin:0 auto 16px;}
.input-header p{font-size:16px;color:var(--text);line-height:1.7;}
.input-area{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}
.input-area textarea{width:100%;min-height:100px;padding:16px;border:2px solid #EAE6E0;border-radius:var(--radius);font-family:inherit;font-size:15px;line-height:1.7;color:var(--text);background:var(--card-bg);resize:none;outline:none;transition:border-color 0.2s;}
.input-area textarea:focus{border-color:var(--text-light);}
.input-area textarea::placeholder{color:#C4BFB8;}
.topic-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.topic-tag{padding:8px 16px;border-radius:20px;border:1.5px solid #E0DBD4;background:var(--card-bg);font-size:13px;color:var(--text-light);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.topic-tag:hover,.topic-tag.selected{background:#EAE6E0;color:var(--text);border-color:#C4BFB8;}
.listen-btn{width:100%;max-width:340px;padding:18px;border-radius:var(--radius);border:none;font-size:16px;font-weight:500;color:#fff;cursor:pointer;font-family:inherit;letter-spacing:0.05em;transition:all 0.25s;}
.listen-btn:hover{transform:translateY(-2px);filter:brightness(1.05);}
.listen-btn:active{transform:scale(0.98);}
#chat-screen{padding-top:20px;padding-bottom:20px;justify-content:flex-start;}
.chat-header{display:flex;align-items:center;gap:12px;padding:12px 0;margin-bottom:20px;}
.chat-header .chat-dot{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
.chat-header .chat-name{font-size:15px;font-weight:600;}
.chat-back{margin-left:auto;background:none;border:none;font-size:13px;color:var(--text-light);cursor:pointer;font-family:inherit;padding:8px;}
.chat-messages{flex:1;display:flex;flex-direction:column;gap:16px;padding-bottom:20px;}
.msg-bubble{max-width:85%;padding:16px 20px;border-radius:20px 20px 20px 4px;font-size:15px;line-height:1.8;animation:slideUp 0.5s ease;box-shadow:0 1px 8px rgba(63,58,54,0.04);}
.msg-user{align-self:flex-end;background:#EAE6E0;color:var(--text);border-radius:20px 20px 4px 20px;font-size:14px;}
.typing-indicator{display:flex;gap:6px;padding:16px 20px;max-width:80px;border-radius:20px 20px 20px 4px;animation:slideUp 0.3s ease;}
.typing-indicator span{width:8px;height:8px;border-radius:50%;animation:typingDot 1.2s ease infinite;}
.typing-indicator span:nth-child(2){animation-delay:0.2s}
.typing-indicator span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.feedback-area{display:flex;gap:12px;justify-content:center;padding:16px 0;animation:slideUp 0.5s ease;}
.feedback-btn{padding:12px 24px;border-radius:24px;border:2px solid #E0DBD4;background:var(--card-bg);font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.feedback-btn:hover{transform:translateY(-2px);}
.feedback-btn.positive:hover{border-color:var(--maru-main);background:var(--maru-sub);}
.feedback-btn.negative:hover{border-color:#C4BFB8;background:#F0EDED;}
.feedback-result{text-align:center;font-size:13px;color:var(--text-light);padding:12px;animation:fadeIn 0.3s ease;}
.another-btn{display:block;margin:12px auto 0;padding:14px 32px;border-radius:24px;border:2px solid #E0DBD4;background:var(--card-bg);font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.another-btn:hover{background:#EAE6E0;}
</style>
</head>
<body>
<div id="home" class="screen active">
  <div class="home-greeting"><p class="time-label" id="time-label"></p><h1 id="greeting-text"></h1></div>
  <div class="daily-message" id="daily-message"></div>
  <div class="character-select">
    <h2>だれに聞いてもらう？</h2>
    <button class="char-btn" data-char="maru" onclick="selectCharacter('maru')"><div class="char-dot"></div><div class="char-info"><div class="char-name">まる</div><div class="char-desc">気ぃ張らんでええ、なんでも話して</div></div></button>
    <button class="char-btn" data-char="nagi" onclick="selectCharacter('nagi')"><div class="char-dot"></div><div class="char-info"><div class="char-name">凪</div><div class="char-desc">静かに、そばにいる</div></div></button>
    <button class="char-btn" data-char="rin" onclick="selectCharacter('rin')"><div class="char-dot"></div><div class="char-info"><div class="char-name">凛</div><div class="char-desc">本音で言うわよ。覚悟して聞いてちょうだい</div></div></button>
  </div>
</div>
<div id="input-screen" class="screen">
  <button class="input-back" onclick="goHome()">← もどる</button>
  <div class="input-header"><div class="selected-dot" id="selected-dot"></div><p id="input-prompt"></p></div>
  <div class="input-area">
    <textarea id="user-input" placeholder="話したいこと、なんでも。&#10;書かなくてもだいじょうぶ。" maxlength="200"></textarea>
    <div class="topic-tags">
      <button class="topic-tag" onclick="toggleTag(this)">体調がつらい</button>
      <button class="topic-tag" onclick="toggleTag(this)">仕事で疲れた</button>
      <button class="topic-tag" onclick="toggleTag(this)">家事がしんどい</button>
      <button class="topic-tag" onclick="toggleTag(this)">子どものこと</button>
      <button class="topic-tag" onclick="toggleTag(this)">親の介護</button>
      <button class="topic-tag" onclick="toggleTag(this)">自分の時間がない</button>
      <button class="topic-tag" onclick="toggleTag(this)">なんとなくつらい</button>
    </div>
  </div>
  <button class="listen-btn" id="listen-btn" onclick="startChat()">聞いてくれる？</button>
</div>
<div id="chat-screen" class="screen">
  <div class="chat-header"><div class="chat-dot" id="chat-dot"></div><span class="chat-name" id="chat-name"></span><button class="chat-back" onclick="goHome()">ホームへ</button></div>
  <div class="chat-messages" id="chat-messages"></div>
</div>

function showTypingThenMessages(msgs,c){const m=document.getElementById('chat-messages');let i=0;function next(){if(i>=msgs.length){showFeedback(c);return;}const t=document.createElement('div');t.className='typing-indicator';t.style.background=c.sub;t.innerHTML=`<span style="background:${c.main}"></span><span style="background:${c.main}"></span><span style="background:${c.main}"></span>`;m.appendChild(t);m.scrollTop=m.scrollHeight;setTimeout(()=>{t.remove();const b=document.createElement('div');b.className='msg-bubble';b.style.background=c.sub;b.style.color=c.accent;b.textContent=msgs[i];m.appendChild(b);m.scrollTop=m.scrollHeight;i++;setTimeout(next,400+Math.random()*300);},800+Math.random()*600);}setTimeout(next,600);}
function showFeedback(c){const m=document.getElementById('chat-messages'),f=document.createElement('div');f.className='feedback-area';f.innerHTML='<button class="feedback-btn positive" onclick="submitFeedback(\'good\',this)">グッときた</button><button class="feedback-btn negative" onclick="submitFeedback(\'meh\',this)">いまいち</button>';m.appendChild(f);m.scrollTop=m.scrollHeight;}
function submitFeedback(type,btn){const f=btn.parentElement,tag=selectedTags.length>0?selectedTags[0]:'default';if(!feedbackHistory[currentChar])feedbackHistory[currentChar]={};if(!feedbackHistory[currentChar][tag])feedbackHistory[currentChar][tag]={good:0,meh:0};feedbackHistory[currentChar][tag][type]++;localStorage.setItem('homete_feedback',JSON.stringify(feedbackHistory));f.innerHTML=`<div class="feedback-result">${type==='good'?'ありがとう。覚えておくね。':'ごめんね。もっとあなたに合う言葉、探すね。'}</div>`;const m=document.getElementById('chat-messages'),a=document.createElement('button'),h=document.createElement('button');a.className=h.className='another-btn';a.textContent='もう一回聞いてもらう';a.onclick=()=>selectCharacter(currentChar);h.textContent='ホームにもどる';h.onclick=goHome;m.appendChild(a);m.appendChild(h);m.scrollTop=m.scrollHeight;}
init();
</script>
</body>
